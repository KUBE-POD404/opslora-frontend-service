name: Frontend service Image workflow pipeline

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: frontend-merge-build-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write
  packages: write

jobs:
  get-email:
    runs-on: ubuntu-latest
    outputs:
      email: ${{ steps.author.outputs.email }}
      name: ${{ steps.author.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: author
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_USER_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          SHA="$PR_HEAD_SHA"

          # pull_request.closed runs after merge, and the source branch may already
          # be deleted. Fetch the PR head object explicitly before reading author
          # metadata, then fall back to the merge commit or PR actor if unavailable.
          if ! git cat-file -e "$SHA^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$SHA" || true
          fi

          if git cat-file -e "$SHA^{commit}" 2>/dev/null; then
            EMAIL=$(git show -s --format='%ae' "$SHA")
            NAME=$(git show -s --format='%an' "$SHA")
          elif [ -n "${PR_MERGE_SHA:-}" ] && git cat-file -e "$PR_MERGE_SHA^{commit}" 2>/dev/null; then
            EMAIL=$(git show -s --format='%ae' "$PR_MERGE_SHA")
            NAME=$(git show -s --format='%an' "$PR_MERGE_SHA")
          else
            EMAIL=""
            NAME="$PR_USER_LOGIN"
          fi

          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

  gate:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - id: gate
        run: |
          export GH_TOKEN=${{ github.token }}

          SHOULD_BUILD=false

          if [ "${{ github.event.pull_request.merged }}" != "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q '"build"'; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews > reviews.json

          APPROVED=$(jq -r 'map(select(.state == "APPROVED")) | length > 0' reviews.json)

          if [ "$APPROVED" = "true" ]; then
            SHOULD_BUILD=true
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

  frontend-checks:
    needs: gate
    if: ${{ needs.gate.outputs.should_build == 'true' }}
    uses: ./.github/workflows/ci-check.yaml

  docker-build:
    needs:
      - gate
      - frontend-checks
    if: ${{ needs.gate.outputs.should_build == 'true' && needs.frontend-checks.result == 'success' }}
    permissions:
      contents: read
      actions: read
      id-token: write
      security-events: write
      packages: write
    uses: ./.github/workflows/ci-docker-build.yaml
    secrets: inherit

  update-helm-test-values:
    name: Update frontend test values in helm repo
    needs:
      - gate
      - docker-build
    if: ${{ needs.gate.outputs.should_build == 'true' && needs.docker-build.result == 'success' }}
    uses: ./.github/workflows/cd-helm-test.yaml
    with:
      helm_repo: KUBE-POD404/opslora-helm-charts
      helm_branch: test/opslora-helm-test
      values_file: opslora-helm/apps/frontend/values-azure-test.yaml
      image_tag: ${{ needs.docker-build.outputs.image_tag }}
      image_repository: ${{ needs.docker-build.outputs.image_repository }}
      yaml_path: .image.tag
      repository_yaml_path: .image.repository
      commit_message: "ci(frontend): update azure test ACR image to ${{ needs.docker-build.outputs.image_tag }}"
    secrets:
      HELM_REPO_TOKEN: ${{ secrets.HELM_REPO_TOKEN }}


  notify:
      name: Notification for image pipeline
      runs-on: ubuntu-latest
      needs:
        - gate
        - get-email
        - frontend-checks
        - docker-build
      if: ${{ always() && needs.gate.outputs.should_build == 'true' && (needs.frontend-checks.result == 'failure' || needs.docker-build.result == 'failure') }}
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Send frontend check notification
          if: ${{ needs.frontend-checks.result == 'failure' }}
          uses: ./.github/actions/notification-action
          with:
            pipeline_name: ${{ github.workflow }}
            repository_name: ${{ github.repository }}
            failure_reason: ${{ needs.frontend-checks.outputs.failure_stage }}
            author: ${{ needs.get-email.outputs.name || github.actor }}
            smtp_username: ${{ secrets.SMTP_USERNAME }}
            smtp_password: ${{ secrets.SMTP_PASSWORD }}
            mail_from: ${{ secrets.MAIL_FROM }}
            mail_to: ${{ needs.get-email.outputs.email }}
            slack_webhook: ${{ secrets.SLACK_INCOMING_WEBHOOK }}
            workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            report_url: ${{ needs.frontend-checks.outputs.report_url }}

        - name: Send image pipeline notification
          if: ${{ needs.docker-build.result == 'failure' }}
          uses: ./.github/actions/notification-action
          with:
            pipeline_name: ${{ github.workflow }}
            repository_name: ${{ github.repository }}
            failure_reason: ${{ needs.docker-build.outputs.failure_stage }}
            author: ${{ needs.get-email.outputs.name || github.actor }}
            smtp_username: ${{ secrets.SMTP_USERNAME }}
            smtp_password: ${{ secrets.SMTP_PASSWORD }}
            mail_from: ${{ secrets.MAIL_FROM }}
            mail_to: ${{ needs.get-email.outputs.email }}
            slack_webhook: ${{ secrets.SLACK_INCOMING_WEBHOOK }}
            workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            report_url: ${{ needs.docker-build.outputs.report_url }}
